server {
    listen 8088 default_server;
    server_name _;

    root /var/www/devops-demo;
    index index.html;

    access_log /var/log/nginx/devops-demo.access.log;
    error_log /var/log/nginx/devops-demo.error.log;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files  / =404;
    }
}
