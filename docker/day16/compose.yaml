services:
  api:
    build:
      context: ../day14/app
    image: devops-python-api:compose
    environment:
      PORT: "8000"
    expose:
      - "8000"

  nginx:
    image: nginx:stable
    ports:
      - "8093:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
