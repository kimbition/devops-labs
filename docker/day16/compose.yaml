services:
  api:
    build:
      context: ../day14/app
    image: devops-python-api:compose
    environment:
      PORT: "${APP_PORT}"
      APP_NAME: "${APP_NAME}"
    expose:
      - "${APP_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${APP_PORT}/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:stable
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
